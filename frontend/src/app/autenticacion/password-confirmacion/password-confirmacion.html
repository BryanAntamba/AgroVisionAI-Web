<!-- Vista final de confirmación, aplicamos clase de animación de vista (fade-view) -->
<section class="password-confirmation-content fade-view">
  <!-- Logotipo de la marca -->
  <img
    class="confirmation-logo fade-up delay-1"
    src="assets/logotipos/escudo.png"
    alt="AgroVision AI"
  />

  <!-- Mensaje principal de éxito -->
  <h1 class="fade-up delay-2">Contraseña actualizada</h1>

  <!-- Texto de confirmación de registro de la clave -->
  <p class="confirmation-description fade-up delay-3">
    Tu nueva contraseña fue registrada correctamente.
  </p>

  <!-- Mensaje de redirección automática -->
  <p class="confirmation-description fade-up delay-3" style="font-size: 0.9rem; color: #666; margin-top: 1rem;">
    Serás redirigido al login en {{ countdown }} segundo{{ countdown !== 1 ? 's' : '' }}...
  </p>

  <!-- Botón que redirige de vuelta al login principal para autenticarse con las nuevas credenciales -->
  <button
    class="confirmation-link fade-up delay-4"
    type="button"
    (click)="regresarAIniciarSesion()"
  >
    Ir al login ahora
  </button>
</section>
