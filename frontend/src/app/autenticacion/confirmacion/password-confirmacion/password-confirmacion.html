<section class="password-confirmation-content fade-view">
  <img
    class="confirmation-logo fade-up delay-1"
    src="assets/logotipos/escudo.png"
    alt="AgroVision AI"
  />

  <h1 class="fade-up delay-2">Contrasena actualizada</h1>

  <p class="confirmation-description fade-up delay-3">
    Tu nueva contrasena fue registrada correctamente.
  </p>

  <button
    class="confirmation-link fade-up delay-4"
    type="button"
    (click)="regresarAIniciarSesion()"
  >
    Regresar a iniciar sesión
  </button>
</section>
