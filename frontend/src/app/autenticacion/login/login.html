<!-- Contenedor principal de la página de inicio de sesión -->
<main class="login-page">
  <!-- Sección izquierda: Carrusel de imágenes decorativas -->
  <section class="carousel-panel" aria-label="Imágenes de AgroVision AI">
    <div
      id="carouselExampleFade"
      class="carousel slide carousel-fade"
      data-bs-ride="carousel"
      data-bs-interval="6000"
    >
      <div class="carousel-inner">
        <!-- Ítem 1 del carrusel (activo por defecto) -->
        <div class="carousel-item active">
          <img
            src="assets/imagesLogin/sosteniendoTomate.jpg"
            class="d-block w-100"
            alt="Cultivo de tomate sostenido en mano"
          />
        </div>
        <!-- Ítem 2 del carrusel -->
        <div class="carousel-item">
          <img
            src="assets/imagesLogin/tomateHumedo.jpg"
            class="d-block w-100"
            alt="Tomate húmedo en cultivo"
          />
        </div>
        <!-- Ítem 3 del carrusel -->
        <div class="carousel-item">
          <img
            src="assets/imagesLogin/tomateIluminado.jpg"
            class="d-block w-100"
            alt="Tomate iluminado en cultivo"
          />
        </div>
      </div>

      <!-- Botón para retroceder en el carrusel -->
      <button
        class="carousel-control-prev"
        type="button"
        data-bs-target="#carouselExampleFade"
        data-bs-slide="prev"
      >
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Anterior</span>
      </button>

      <!-- Botón para avanzar en el carrusel -->
      <button
        class="carousel-control-next"
        type="button"
        data-bs-target="#carouselExampleFade"
        data-bs-slide="next"
      >
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Siguiente</span>
      </button>
    </div>
  </section>

  <!-- Sección derecha: Panel de inicio de sesión o recuperación -->
  <section class="login-panel">
    <div class="login-card">
      <!-- Verifica si se debe mostrar el login normal o el flujo de recuperar contraseña -->
      <ng-container *ngIf="!showResetPassword; else resetPasswordView">
        <!-- Logotipo de la marca -->
        <img
          class="brand-logo fade-up delay-1"
          src="assets/logotipos/escudo.png"
          alt="AgroVision AI"
        />

        <!-- Título principal -->
        <h1 class="fade-up delay-2">Iniciar Sesión</h1>

        <!-- Formulario reactivo de Angular enlazado a loginForm -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
          
          <!-- Campo de correo electrónico -->
          <div class="field fade-up delay-3">
            <label for="email">Correo electrónico</label>
            <div class="input-shell">
              <i class="fa-solid fa-envelope"></i>
              <input
                id="email"
                type="email"
                placeholder="Correo corporativo"
                formControlName="email"
                autocomplete="email"
              />
            </div>
            <!-- Mensaje de error para el correo electrónico (si existe) -->
            <small *ngIf="validators.getLoginEmailError(emailControl)">
              {{ validators.getLoginEmailError(emailControl) }}
            </small>
          </div>

          <!-- Campo de contraseña -->
          <div class="field fade-up delay-4">
            <label for="password">Contraseña</label>
            <div class="input-shell">
              <i class="fa-solid fa-lock"></i>
              <!-- Tipo de input dinámico para mostrar u ocultar la contraseña -->
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                placeholder="Ingresa tu contraseña"
                formControlName="password"
                autocomplete="current-password"
              />
              <!-- Botón (ojo) para alternar la visibilidad de la contraseña -->
              <button
                class="password-toggle"
                type="button"
                (click)="togglePassword()"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
              >
                <!-- Cambia el icono dependiendo de si la contraseña es visible -->
                <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
            <!-- Mensaje de error para la contraseña (si existe) -->
            <small *ngIf="validators.getLoginPasswordError(passwordControl)">
              {{ validators.getLoginPasswordError(passwordControl) }}
            </small>
          </div>

          <!-- Botón de envío del formulario -->
          <button class="submit-button fade-up delay-5" type="submit" [disabled]="isLoading">{{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}</button>

          <!-- Muestra un mensaje de error global si las credenciales son incorrectas -->
          <p class="login-error fade-up delay-5" *ngIf="loginError">{{ loginError }}</p>
        </form>

        <!-- Enlace para ir al flujo de "Olvidaste tu contraseña" -->
        <button
          class="forgot-link fade-up delay-6 auth-link-motion"
          type="button"
          (click)="openResetPassword()"
        >
          ¿Olvidaste tu contraseña?
        </button>
      </ng-container>

      <!-- Plantilla alternativa que carga el componente de restablecer contraseña -->
      <ng-template #resetPasswordView>
        <app-restablecer-password
          #resetPassword
          (volverLogin)="backToLogin()"
        ></app-restablecer-password>
        
        <!-- Botón extra que solo aparece cuando se está pidiendo el código para permitir cambiar el correo -->
        <button
          *ngIf="resetPassword.paso === 'codigo'"
          class="forgot-link fade-up delay-6 auth-link-motion"
          type="button"
          (click)="resetPassword.volverACorreo()"
        >
          Cambiar correo electrónico
        </button>
      </ng-template>
    </div>
  </section>
</main>
