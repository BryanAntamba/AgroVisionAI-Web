<div class="verification-card-content">
  <img
    class="verification-logo fade-up delay-1"
    src="assets/logotipos/escudo.png"
    alt="AgroVision AI"
  />

  <h1 class="fade-up delay-2">Codigo de verificacion</h1>

  <p class="verification-description fade-up delay-3">
    Ingresa el codigo de 6 digitos enviado a {{ correo }}.
  </p>

  <form [formGroup]="codigoForm" (ngSubmit)="verificarCodigo()" novalidate>
    <div class="field fade-up delay-4">
      <label for="verification-code">Codigo de verificacion</label>
      <div class="input-shell code-shell">
        <i class="fa-solid fa-shield-halved"></i>
        <input
          id="verification-code"
          type="text"
          inputmode="numeric"
          maxlength="6"
          placeholder="000000"
          formControlName="codigo"
          autocomplete="one-time-code"
          (keypress)="soloNumeros($event)"
          (input)="normalizarCodigo()"
        />
      </div>

      <small *ngIf="validators.getCodigoVerificacionError(codigoControl)">
        {{ validators.getCodigoVerificacionError(codigoControl) }}
      </small>
    </div>

    <button class="submit-button fade-up delay-5" type="submit">Verificar codigo</button>

    <div class="resend-section">
      <p class="resend-text fade-up delay-6">¿No recibiste el codigo?</p>
      <button
        type="button"
        class="resend-link fade-up delay-6 auth-link-motion"
        (click)="solicitarReenvio()"
        [disabled]="limiteReenvioAlcanzado"
      >
        Reenviar codigo
      </button>
      <p
        class="resend-feedback"
        [ngClass]="{ 'is-error': limiteReenvioAlcanzado }"
        *ngIf="mensajeReenvio || limiteReenvioAlcanzado"
      >
        <span *ngIf="!limiteReenvioAlcanzado">{{ mensajeReenvio }}</span>
        <span *ngIf="limiteReenvioAlcanzado">
          Has alcanzado el límite de reenvíos.<br>
          Inténtalo nuevamente en <strong>{{ tiempoFormateado }}</strong>
        </span>
      </p>
    </div>
  </form>
</div>
