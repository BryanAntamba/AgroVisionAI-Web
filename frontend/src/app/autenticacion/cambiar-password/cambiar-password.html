<div class="change-card-content">
  <img
    class="change-logo fade-up delay-1"
    src="assets/logotipos/escudo.png"
    alt="AgroVision AI"
  />

  <h1 class="fade-up delay-2">Cambiar contrasena</h1>

  <p class="change-description fade-up delay-3">
    Crea una nueva contrasena y confirmala para finalizar.
  </p>

  <form [formGroup]="passwordForm" (ngSubmit)="confirmarPassword()" novalidate>
    <div class="field fade-up delay-4">
      <label for="new-password">Nueva contrasena</label>
      <div class="input-shell">
        <i class="fa-solid fa-lock"></i>
        <input
          id="new-password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Nueva contrasena"
          formControlName="password"
          autocomplete="new-password"
        />
        <button
          class="password-toggle"
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
        >
          <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <small *ngIf="validators.getCambiarPasswordError(passwordControl)">
        {{ validators.getCambiarPasswordError(passwordControl) }}
      </small>
    </div>

    <div class="field fade-up delay-5">
      <label for="confirm-password">Confirmar contrasena</label>
      <div class="input-shell">
        <i class="fa-solid fa-shield-halved"></i>
        <input
          id="confirm-password"
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirma tu contrasena"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
        <button
          class="password-toggle"
          type="button"
          (click)="toggleConfirmPassword()"
          [attr.aria-label]="showConfirmPassword ? 'Ocultar contrasena' : 'Mostrar contrasena'"
        >
          <i class="fa-solid" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <small *ngIf="validators.getConfirmarPasswordError(confirmPasswordControl, passwordForm)">
        {{ validators.getConfirmarPasswordError(confirmPasswordControl, passwordForm) }}
      </small>
    </div>

    <button class="submit-button fade-up delay-6" type="submit">Confirmar contrasena</button>
  </form>
</div>
