<!-- Contenedor principal de la tarjeta de cambio de contraseña -->
<div class="change-card-content">
  <!-- Logotipo animado superior -->
  <img
    class="change-logo fade-up delay-1"
    src="assets/logotipos/escudo.png"
    alt="AgroVision AI"
  />

  <!-- Título principal -->
  <h1 class="fade-up delay-2">Cambiar contraseña</h1>

  <!-- Descripción breve de la acción esperada -->
  <p class="change-description fade-up delay-3">
    Crea una nueva contraseña y confírmala para finalizar.
  </p>

  <!-- Formulario reactivo asociado a passwordForm -->
  <form [formGroup]="passwordForm" (ngSubmit)="confirmarPassword()" novalidate>
    
    <!-- Campo: Nueva Contraseña -->
    <div class="field fade-up delay-4">
      <label for="new-password">Nueva contraseña</label>
      <div class="input-shell">
        <i class="fa-solid fa-lock"></i>
        <!-- Tipo dinámico: se alterna entre password (oculto) y text (visible) -->
        <input
          id="new-password"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Nueva contraseña"
          formControlName="password"
          autocomplete="new-password"
        />
        <!-- Botón para ocultar/mostrar la contraseña -->
        <button
          class="password-toggle"
          type="button"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <i class="fa-solid" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <!-- Muestra errores específicos de las reglas de la nueva contraseña -->
      <small *ngIf="validators.getCambiarPasswordError(passwordControl)">
        {{ validators.getCambiarPasswordError(passwordControl) }}
      </small>
    </div>

    <!-- Campo: Confirmar Contraseña -->
    <div class="field fade-up delay-5">
      <label for="confirm-password">Confirmar contraseña</label>
      <div class="input-shell">
        <i class="fa-solid fa-shield-halved"></i>
        <!-- Tipo dinámico independiente del anterior -->
        <input
          id="confirm-password"
          [type]="showConfirmPassword ? 'text' : 'password'"
          placeholder="Confirma tu contraseña"
          formControlName="confirmPassword"
          autocomplete="new-password"
        />
        <!-- Botón para ocultar/mostrar la confirmación de la contraseña -->
        <button
          class="password-toggle"
          type="button"
          (click)="toggleConfirmPassword()"
          [attr.aria-label]="showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        >
          <i class="fa-solid" [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>

      <!-- Muestra errores si las contraseñas no coinciden o la confirmación está vacía -->
      <small *ngIf="validators.getConfirmarPasswordError(confirmPasswordControl, passwordForm)">
        {{ validators.getConfirmarPasswordError(confirmPasswordControl, passwordForm) }}
      </small>
    </div>

    <!-- Botón final para aplicar los cambios -->
    <button class="submit-button fade-up delay-6" type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Guardando...' : 'Confirmar contraseña' }}
    </button>

    <div *ngIf="changeError" class="error-message fade-up" role="alert" aria-live="assertive">
      {{ changeError }}
    </div>
  </form>

  <!-- Botón inferior para cancelar el proceso y volver a la pantalla inicial -->
  <button
    class="change-link fade-up delay-6 auth-link-motion"
    type="button"
    (click)="regresarALogin()"
  >
    Regresar a iniciar sesión
  </button>
</div>
