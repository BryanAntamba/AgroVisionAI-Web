<!-- Contenedor general del flujo de restablecimiento de contraseña -->
<div class="reset-card-content">
  <!-- Utilizamos ngSwitch para controlar qué paso del flujo (correo, código, etc) se muestra -->
  <ng-container [ngSwitch]="paso">
    
    <!-- PASO 1: Ingreso de correo electrónico -->
    <section *ngSwitchCase="'correo'" class="step-content fade-view">
      <!-- Logotipo con efecto de aparición animada -->
      <img
        class="reset-logo fade-up delay-1"
        src="assets/logotipos/escudo.png"
        alt="AgroVision AI"
      />

      <!-- Título de la pantalla -->
      <h1 class="fade-up delay-2">Restablecer contraseña</h1>

      <!-- Instrucciones para el usuario -->
      <p class="reset-description fade-up delay-3">
        Se enviará un código de verificación a tu correo personal.
      </p>

      <!-- Formulario para ingresar el correo -->
      <form [formGroup]="resetForm" (ngSubmit)="enviarCodigo()" novalidate>
        <div class="field fade-up delay-4">
          <label for="reset-email">Correo personal</label>
          <div class="input-shell">
            <i class="fa-solid fa-envelope"></i>
            <input
              id="reset-email"
              type="email"
              placeholder="ejemplo@gmail.com"
              formControlName="email"
              autocomplete="email"
            />
          </div>

          <!-- Mensaje de error para validaciones locales (ej. no es formato email) -->
          <small *ngIf="validators.getRestablecerPasswordEmailError(emailControl)">
            {{ validators.getRestablecerPasswordEmailError(emailControl) }}
          </small>
        </div>

        <!-- Muestra error del servidor o en este caso validación de correo simulado -->
        <p class="error-message fade-up" *ngIf="resetError">{{ resetError }}</p>

        <!-- Botón para enviar el código e ir al paso 2 -->
        <button class="submit-button fade-up delay-5" type="submit">Enviar codigo</button>
      </form>

      <!-- Botón para cancelar el flujo y regresar al inicio de sesión principal -->
      <button
        class="reset-link fade-up delay-6 auth-link-motion"
        type="button"
        (click)="regresarALogin()"
      >
        Regresar a iniciar sesión
      </button>
    </section>

    <!-- PASO 2: Ingreso del código de verificación (Componente Hijo) -->
    <!-- Se le pasa el correo ingresado y se escuchan los eventos del hijo -->
    <app-codigo-verificacion
      *ngSwitchCase="'codigo'"
      [correo]="correoVerificado"
      class="fade-view"
      (codigoVerificado)="mostrarCambioPassword()"
      (reenviarCodigo)="reenviarCodigoVerificacion()"
    ></app-codigo-verificacion>

    <!-- PASO 3: Cambio de contraseña por una nueva (Componente Hijo) -->
    <!-- Se escucha el evento de éxito para avanzar al paso final -->
    <app-cambiar-password
      *ngSwitchCase="'password'"
      [correo]="correoVerificado"
      class="fade-view"
      (passwordCambiado)="finalizarCambio()"
      (volverLogin)="regresarALogin()"
    ></app-cambiar-password>

    <!-- PASO 4: Confirmación visual de éxito (Componente Hijo) -->
    <app-password-confirmacion
      *ngSwitchCase="'finalizado'"
      (regresarLogin)="regresarALogin()"
    ></app-password-confirmacion>
  </ng-container>
</div>
