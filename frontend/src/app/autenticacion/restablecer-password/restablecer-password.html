<div class="reset-card-content">
  <ng-container [ngSwitch]="paso">
    <section *ngSwitchCase="'correo'" class="step-content fade-view">
      <img
        class="reset-logo fade-up delay-1"
        src="assets/logotipos/escudo.png"
        alt="AgroVision AI"
      />

      <h1 class="fade-up delay-2">Restablecer contrasena</h1>

      <p class="reset-description fade-up delay-3">
        Se enviara un codigo de verificacion a tu correo electronico.
      </p>

      <form [formGroup]="resetForm" (ngSubmit)="enviarCodigo()" novalidate>
        <div class="field fade-up delay-4">
          <label for="reset-email">Correo electronico</label>
          <div class="input-shell">
            <i class="fa-solid fa-envelope"></i>
            <input
              id="reset-email"
              type="email"
              placeholder="usuario@gmail.com"
              formControlName="email"
              autocomplete="email"
            />
          </div>

          <small *ngIf="validators.getRestablecerPasswordEmailError(emailControl)">
            {{ validators.getRestablecerPasswordEmailError(emailControl) }}
          </small>
        </div>

        <p class="error-message fade-up" *ngIf="resetError">{{ resetError }}</p>

        <button class="submit-button fade-up delay-5" type="submit">Enviar codigo</button>
      </form>
    </section>

    <app-codigo-verificacion
      *ngSwitchCase="'codigo'"
      [correo]="correoVerificado"
      class="fade-view"
      (codigoVerificado)="mostrarCambioPassword()"
      (reenviarCodigo)="reenviarCodigoVerificacion()"
    ></app-codigo-verificacion>

    <app-cambiar-password
      *ngSwitchCase="'password'"
      class="fade-view"
      (passwordCambiado)="finalizarCambio()"
    ></app-cambiar-password>

    <section *ngSwitchCase="'finalizado'" class="step-content fade-view">
      <img
        class="reset-logo fade-up delay-1"
        src="assets/logotipos/escudo.png"
        alt="AgroVision AI"
      />

      <h1 class="fade-up delay-2">Contrasena actualizada</h1>

      <p class="reset-description fade-up delay-3">
        Tu nueva contrasena fue registrada correctamente.
      </p>
    </section>
  </ng-container>
</div>
