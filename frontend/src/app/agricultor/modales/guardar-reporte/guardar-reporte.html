<!-- Modal: Confirmación de que el reporte fue guardado exitosamente -->
<div class="modal-overlay" (click)="cerrarModal()">
  <div class="modal-exito" (click)="$event.stopPropagation()" role="dialog" aria-labelledby="modalReporteTitulo" aria-modal="true">
    <div class="modal-exito-icono" aria-hidden="true">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h3 id="modalReporteTitulo">Reporte guardado correctamente</h3>
    <p>El reporte se guardó con éxito y estará disponible en el historial.</p>
    <button type="button" class="btn-modal-aceptar" (click)="cerrarModal()">Aceptar</button>
  </div>
</div>
