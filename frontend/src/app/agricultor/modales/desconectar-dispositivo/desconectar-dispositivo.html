<!-- Fondo oscuro semitransparente que cubre toda la pantalla. Si se hace clic fuera de la tarjeta, se cierra el modal -->
<div
  class="modal-backdrop"
  (click)="cerrarModal()"
  role="presentation"
>
  <!-- Tarjeta central blanca del modal. El $event.stopPropagation evita que al hacer clic dentro de la tarjeta se cierre el modal -->
  <div
    class="modal-card modal-card-confirm"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="modal-desconectar-titulo"
    (click)="$event.stopPropagation()"
  >
    <!-- Botón con la 'X' en la esquina superior derecha para cerrar -->
    <button
      class="modal-close"
      type="button"
      aria-label="Cerrar"
      (click)="cerrarModal()"
    >
      <i class="fa-solid fa-xmark"></i>
    </button>

    <!-- Título de confirmación principal -->
    <h2 id="modal-desconectar-titulo">¿Desconectar el dispositivo?</h2>

    <!-- Texto descriptivo con la advertencia de lo que sucederá -->
    <p class="confirm-message">
      El monitoreo en tiempo real se detendrá. Podrá conectar el dispositivo nuevamente cuando lo necesite.
    </p>

    <!-- Contenedor inferior para los botones de acción -->
    <div class="modal-actions">
      <!-- Botón secundario para cancelar la acción -->
      <button class="modal-cancel" type="button" (click)="cerrarModal()">
        Cancelar
      </button>
      <!-- Botón principal para confirmar la desconexión -->
      <button class="modal-desconectar" type="button" (click)="confirmarDesconexion()">
        <i class="fa-solid fa-plug"></i>
        Desconectar
      </button>
    </div>
  </div>
</div>
