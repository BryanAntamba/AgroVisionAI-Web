<!-- Contenedor centralizado para la pantalla de conexión -->
<div class="boton-iot-container">
  
  <!-- Imagen decorativa con el logotipo del escudo de AgroVision -->
  <img src="assets/logotipos/escudo.png" alt="AgroVision AI Logo" class="logo-conexion" />
  
  <!-- Título con diseño partido en dos colores -->
  <h1 class="titulo-agrovision">
    <span class="texto-agrovision">AgroVision</span>
    <span class="texto-ai">AI</span>
  </h1>
  
  <!-- Botón principal de Encendido. Aplica dinámicamente clases CSS para cambiar colores o animaciones (pulsar) dependiendo del estado booleano de TypeScript -->
  <button 
    class="boton-conexion"
    [class.conectando]="isConnecting"
    [class.conectado]="isConnected"
    [class.error]="errorConexion"
    (click)="onConectarDispositivo()"
    [disabled]="isConnecting || isConnected">
    <i class="fas fa-power-off"></i>
  </button>

  <!-- Muestra el texto descriptivo indicando en qué paso de la conexión estamos -->
  <div class="descripcion-conexion" [class.error-text]="errorConexion">
    <p>{{ descripcion }}</p>
  </div>

  <!-- Si ocurre un error, este botón aparece permitiendo al usuario volver a intentar conectarse -->
  <button 
    *ngIf="errorConexion"
    class="boton-reintentar"
    (click)="reintentar()">
    <i class="fas fa-rotate-right"></i>
    Reintentar
  </button>

  <!-- Mensaje de éxito persistente con punto animado cuando se logra conectar -->
  <div *ngIf="isConnected" class="indicador-conexion">
    <span class="punto-verde"></span>
    <span>Dispositivo conectado</span>
  </div>
</div>
