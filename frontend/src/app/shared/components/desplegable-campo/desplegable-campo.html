<div class="desplegable-campo" [class.abierto]="abierto" [class.deshabilitado]="deshabilitado">
  <button
    [id]="campoId"
    class="desplegable-trigger"
    type="button"
    [attr.aria-expanded]="abierto"
    [attr.aria-haspopup]="'listbox'"
    [attr.aria-controls]="campoId + '-lista'"
    [disabled]="deshabilitado"
    (click)="alternar()"
  >
    <i [class]="icono" aria-hidden="true"></i>
    <span class="desplegable-texto" [class.placeholder]="sinSeleccion">{{ textoMostrado }}</span>
    <i class="fa-solid fa-chevron-down desplegable-chevron" aria-hidden="true"></i>
  </button>

  <ul
    *ngIf="abierto"
    class="desplegable-opciones"
    [id]="campoId + '-lista'"
    role="listbox"
    [attr.aria-labelledby]="campoId"
  >
    <li
      *ngFor="let opcion of opciones"
      role="option"
      [class.seleccionada]="opcion === valor"
      [attr.aria-selected]="opcion === valor"
      (click)="elegir(opcion)"
    >
      {{ opcion }}
    </li>
  </ul>
</div>
