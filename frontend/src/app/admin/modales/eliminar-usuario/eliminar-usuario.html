<!-- Fondo oscuro del modal que cubre toda la pantalla -->
<div
  class="modal-backdrop"
  (click)="cerrarModal()"
  role="presentation"
>
  <!-- Tarjeta del modal de confirmación centrada en la pantalla -->
  <div
    class="modal-card modal-card-confirm"
    role="alertdialog"
    aria-modal="true"
    aria-labelledby="modal-eliminar-titulo"
    (click)="$event.stopPropagation()"
  >
    <!-- Botón de cierre (X) en la esquina superior derecha -->
    <button
      class="modal-close"
      type="button"
      aria-label="Cerrar"
      (click)="cerrarModal()"
    >
      <!-- Ícono de X para cerrar el modal -->
      <i class="fa-solid fa-xmark"></i>
    </button>

    <!-- Título principal del modal -->
    <h2 id="modal-eliminar-titulo">Eliminar usuario</h2>

    <!-- Mensaje de confirmación que muestra el nombre completo y rol del usuario -->
    <p class="confirm-message">
      ¿Estas seguro de que deseas eliminar al usuario
      <!-- Muestra el nombre completo del usuario en negrita -->
      <strong>{{ nombreCompleto() }}</strong>
      con el rol de <strong>{{ usuario.rol }}</strong>?
    </p>

    <!-- Advertencia en rojo indicando que la acción no se puede deshacer -->
    <p class="confirm-warning">Esta accion no se puede deshacer.</p>

    <!-- Contenedor de botones de acción del modal -->
    <div class="modal-actions">
      <!-- Botón para cancelar y cerrar el modal sin eliminar -->
      <button class="modal-cancel" type="button" (click)="cerrarModal()">
        Cancelar
      </button>
      <!-- Botón destructivo para confirmar la eliminación -->
      <button class="modal-delete" type="button" (click)="confirmarEliminacion()">
        <!-- Ícono de basurero -->
        <i class="fa-solid fa-trash"></i>
        Eliminar usuario
      </button>
    </div>
  </div>
</div>
